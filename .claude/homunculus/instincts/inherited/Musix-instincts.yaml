# Musix Workflow Room Database Schema Migration

## Action

Follow the room-database-schema-migration workflow:
1. Update the Room database class (e.g., MusixDatabase.kt) to define new schema version and migration logic.
2. Update build.gradle.kts to enable exportSchema and configure room.schemaLocation.
3. Commit the generated schema file under app/schemas/ for the new version.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: app/src/main/java/com/louis/musix/data/local/MusixDatabase.kt, app/build.gradle.kts, app/schemas/com.louis.musix.data.local.MusixDatabase/*.json

